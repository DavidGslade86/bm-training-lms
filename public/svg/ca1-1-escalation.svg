<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 720 460' role='img' aria-label='Escalation ladder for unresponsive outstanding-kit clients'><defs><style>.t{font-family:system-ui,-apple-system,sans-serif;font-weight:600;fill:#2c2c2c}.s{font-family:system-ui,-apple-system,sans-serif;font-weight:400;fill:#555}.l{font-family:system-ui,-apple-system,sans-serif;font-weight:700;fill:#ffffff}</style><marker id='arrD' markerWidth='8' markerHeight='8' refX='4' refY='7' orient='auto'><polygon points='0 0, 8 0, 4 8' fill='#63656a'/></marker><marker id='arrR' markerWidth='8' markerHeight='8' refX='7' refY='4' orient='auto'><polygon points='0 0, 8 4, 0 8' fill='#63656a'/></marker><marker id='arrL' markerWidth='8' markerHeight='8' refX='1' refY='4' orient='auto'><polygon points='8 0, 0 4, 8 8' fill='#63656a'/></marker></defs><g><rect x='220' y='10' width='200' height='44' rx='6' fill='#e6f5fc' stroke='#009bdf' stroke-width='2'/><text x='320' y='28' text-anchor='middle' class='t' font-size='12'>Follow-Up Cycle 1</text><text x='320' y='44' text-anchor='middle' class='s' font-size='11'>Attempts #1–#4</text></g><line x1='320' y1='54' x2='320' y2='100' stroke='#63656a' stroke-width='1.5' marker-end='url(#arrD)'/><text x='340' y='82' class='s' font-size='10'>4 unsuccessful</text><g><rect x='220' y='110' width='200' height='44' rx='6' fill='#fbeed9' stroke='#c87515' stroke-width='2'/><text x='320' y='128' text-anchor='middle' class='t' font-size='12'>GCL Triggered</text><text x='320' y='144' text-anchor='middle' class='s' font-size='11'>General Contact Letter from AM</text></g><path d='M 420 132 L 480 132' stroke='#63656a' stroke-width='1.5' stroke-dasharray='4,3' marker-end='url(#arrR)'/><g><rect x='480' y='110' width='220' height='44' rx='6' fill='#fdfcfa' stroke='#888' stroke-width='1.5' stroke-dasharray='4,3'/><text x='590' y='128' text-anchor='middle' class='t' font-size='11' fill='#555'>You set a GCL task</text><text x='590' y='144' text-anchor='middle' class='s' font-size='10'>on your Assistant Manager</text></g><line x1='320' y1='154' x2='320' y2='200' stroke='#63656a' stroke-width='1.5' marker-end='url(#arrD)'/><text x='340' y='182' class='s' font-size='10'>resume cadence</text><g><rect x='220' y='210' width='200' height='44' rx='6' fill='#dff0f8' stroke='#0883b8' stroke-width='2'/><text x='320' y='228' text-anchor='middle' class='t' font-size='12'>Follow-Up Cycle 2</text><text x='320' y='244' text-anchor='middle' class='s' font-size='11'>Attempts #5–#8</text></g><line x1='320' y1='254' x2='320' y2='300' stroke='#63656a' stroke-width='1.5' marker-end='url(#arrD)'/><text x='340' y='282' class='s' font-size='10'>8 unsuccessful</text><g><rect x='220' y='310' width='200' height='44' rx='6' fill='#fbe5e0' stroke='#b54a4a' stroke-width='2'/><text x='320' y='328' text-anchor='middle' class='t' font-size='12'>FNL Triggered</text><text x='320' y='344' text-anchor='middle' class='s' font-size='11'>Final Notification Letter from AM</text></g><path d='M 420 332 L 480 332' stroke='#63656a' stroke-width='1.5' stroke-dasharray='4,3' marker-end='url(#arrR)'/><g><rect x='480' y='310' width='220' height='44' rx='6' fill='#fdfcfa' stroke='#888' stroke-width='1.5' stroke-dasharray='4,3'/><text x='590' y='328' text-anchor='middle' class='t' font-size='11' fill='#555'>LexisNexis search (AM)</text><text x='590' y='344' text-anchor='middle' class='s' font-size='10'>verify contact info, check for obituary</text></g><line x1='320' y1='354' x2='320' y2='400' stroke='#63656a' stroke-width='1.5' marker-end='url(#arrD)'/><text x='340' y='382' class='s' font-size='10'>no response after FNL</text><g><rect x='220' y='410' width='200' height='44' rx='6' fill='#ebebec' stroke='#63656a' stroke-width='2'/><text x='320' y='428' text-anchor='middle' class='t' font-size='12'>No Case — Unresponsive</text><text x='320' y='444' text-anchor='middle' class='s' font-size='11'>account marked, file preserved</text></g></svg>
