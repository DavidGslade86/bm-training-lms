<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 980 240' role='img' aria-label='Five touchpoints follow-up cadence diagram'><defs><style>.t{font-family:system-ui,-apple-system,sans-serif;font-weight:600;fill:#2c2c2c}.s{font-family:system-ui,-apple-system,sans-serif;font-weight:400;fill:#555}.l{font-family:system-ui,-apple-system,sans-serif;font-weight:700;fill:#ffffff}</style><marker id='arr' markerWidth='8' markerHeight='8' refX='7' refY='4' orient='auto'><polygon points='0 0, 8 4, 0 8' fill='#63656a'/></marker></defs><circle cx='40' cy='40' r='22' fill='#7c3aed'/><text x='40' y='47' text-anchor='middle' class='l' font-size='18'>M</text><text x='72' y='38' class='t' font-size='13'>Maya (CA I)</text><text x='72' y='54' class='s' font-size='11'>Follow-up Cadence</text><path d='M 70 90 L 920 90' stroke='#e8e2d6' stroke-width='2' stroke-dasharray='4,3'/><g><rect x='30' y='110' width='160' height='56' rx='28' fill='#e6f5fc' stroke='#009bdf' stroke-width='2'/><text x='110' y='135' text-anchor='middle' class='t' font-size='12'>1. Intro &amp; Kit</text><text x='110' y='152' text-anchor='middle' class='t' font-size='12'>Follow-up</text><text x='110' y='185' text-anchor='middle' class='s' font-size='11'>weekly</text></g><path d='M 195 138 L 215 138' stroke='#63656a' stroke-width='1.5' marker-end='url(#arr)'/><g><rect x='220' y='110' width='160' height='56' rx='28' fill='#dff0f8' stroke='#0883b8' stroke-width='2'/><text x='300' y='135' text-anchor='middle' class='t' font-size='12'>2. HP POP</text><text x='300' y='152' text-anchor='middle' class='t' font-size='12'>Generation</text><text x='300' y='185' text-anchor='middle' class='s' font-size='11'>weekly</text></g><path d='M 385 138 L 405 138' stroke='#63656a' stroke-width='1.5' marker-end='url(#arr)'/><g><rect x='410' y='110' width='160' height='56' rx='28' fill='#fbeed9' stroke='#c87515' stroke-width='2'/><text x='490' y='135' text-anchor='middle' class='t' font-size='12'>3. HP POP</text><text x='490' y='152' text-anchor='middle' class='t' font-size='12'>Follow-up</text><text x='490' y='185' text-anchor='middle' class='s' font-size='11'>daily in practice</text></g><path d='M 575 138 L 595 138' stroke='#63656a' stroke-width='1.5' marker-end='url(#arr)'/><g><rect x='600' y='110' width='160' height='56' rx='28' fill='#e8efe2' stroke='#5a7a4a' stroke-width='2'/><text x='680' y='135' text-anchor='middle' class='t' font-size='12'>4. Submit WTCHP</text><text x='680' y='152' text-anchor='middle' class='t' font-size='12'>Application</text><text x='680' y='185' text-anchor='middle' class='s' font-size='11'>24 hr from doc arrival</text></g><path d='M 765 138 L 785 138' stroke='#63656a' stroke-width='1.5' marker-end='url(#arr)'/><g><rect x='790' y='110' width='160' height='56' rx='28' fill='#ebebec' stroke='#63656a' stroke-width='2'/><text x='870' y='135' text-anchor='middle' class='t' font-size='12'>5. Enrollment</text><text x='870' y='152' text-anchor='middle' class='t' font-size='12'>Confirmation</text><text x='870' y='185' text-anchor='middle' class='s' font-size='11'>4 wks, then weekly</text></g></svg>
